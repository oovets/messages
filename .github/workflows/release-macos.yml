name: build-macos-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            arch: x86_64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and publish macOS release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --target ${{ matrix.target }} --bundles app,dmg
          tagName: ${{ github.ref_name }}
          releaseName: Messages ${{ github.ref_name }}
          releaseBody: macOS desktop builds for Messages.
          releaseDraft: false
          prerelease: false

      - name: Build and bundle macOS app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --target ${{ matrix.target }} --bundles app,dmg

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: messages-macos-${{ matrix.arch }}-bundles
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
