<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif" font-size="13">
  <defs>
    <linearGradient id="meBubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2891ff"/>
      <stop offset="100%" stop-color="#0a7cff"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .winbg     { fill: #1c1c1e; }
    .sidebar   { fill: #1c1c1e; }
    .pane      { fill: #131315; }
    .border    { stroke: #2c2c2e; stroke-width: 1; fill: none; }
    .softborder{ stroke: #232325; stroke-width: 1; fill: none; }
    .fg        { fill: #f2f2f7; }
    .muted     { fill: #8e8e93; }
    .dim       { fill: #6c6c70; }
    .accent    { fill: #0a7cff; }
    .green     { fill: #34c759; }
    .red       { fill: #ff453a; }
    .titlebar  { fill: #2a2a2c; }
    .selected  { fill: #2a2a2c; }
    .input     { fill: #2a2a2c; }
    .themBubble{ fill: #2c2c2e; }
    .heart     { fill: #ff375f; }
    .badge     { fill: #0a7cff; }
    .focusBar  { fill: #0a7cff; }
    .strong    { font-weight: 600; }
    .bold      { font-weight: 700; }
  </style>

  <!-- window -->
  <rect class="winbg" width="1200" height="720" rx="12" ry="12"/>

  <!-- title bar -->
  <rect class="titlebar" x="0" y="0" width="1200" height="32" rx="12"/>
  <rect class="titlebar" x="0" y="20" width="1200" height="12"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="600" y="20" text-anchor="middle" class="muted strong">Messages</text>

  <!-- sidebar -->
  <rect class="sidebar" x="0" y="32" width="320" height="688"/>
  <line class="border" x1="320" y1="32" x2="320" y2="720"/>

  <!-- sidebar header -->
  <text x="20" y="64" class="fg bold" font-size="16">Messages</text>
  <!-- new message icon -->
  <circle cx="290" cy="58" r="14" fill="#2a2a2c"/>
  <text x="290" y="63" text-anchor="middle" class="fg" font-size="14">✎</text>

  <!-- search box -->
  <rect class="input" x="16" y="80" width="288" height="30" rx="8"/>
  <text x="28" y="100" class="muted">⌕  Search</text>

  <!-- connection status pill -->
  <circle cx="24" cy="128" r="4" class="green"/>
  <text x="36" y="132" class="muted" font-size="11">Connected · WebSocket live</text>

  <!-- chat list -->
  <!-- row 1 selected -->
  <rect class="selected" x="0" y="148" width="320" height="64"/>
  <rect class="focusBar" x="0" y="156" width="3" height="48" rx="1.5"/>
  <circle cx="36" cy="180" r="20" fill="#3a3a3c"/>
  <text x="36" y="185" text-anchor="middle" class="fg strong">AS</text>
  <text x="68" y="172" class="fg strong">Anna Svensson</text>
  <text x="298" y="172" text-anchor="end" class="dim" font-size="11">10:42</text>
  <text x="68" y="192" class="fg" font-size="12">Are you joining the call at 11?</text>
  <circle cx="298" cy="194" r="9" class="badge"/>
  <text x="298" y="198" text-anchor="middle" class="fg bold" font-size="10">2</text>
  <line class="softborder" x1="0" y1="212" x2="320" y2="212"/>

  <!-- row 2 -->
  <circle cx="36" cy="244" r="20" fill="#3a3a3c"/>
  <text x="36" y="249" text-anchor="middle" class="fg strong">MK</text>
  <text x="68" y="236" class="fg strong">Mom &amp; Kids</text>
  <text x="298" y="236" text-anchor="end" class="dim" font-size="11">09:18</text>
  <text x="68" y="256" class="muted" font-size="12">Liam: see you tonight ❤️</text>
  <line class="softborder" x1="0" y1="276" x2="320" y2="276"/>

  <!-- row 3 typing -->
  <circle cx="36" cy="308" r="20" fill="#3a3a3c"/>
  <text x="36" y="313" text-anchor="middle" class="fg strong">JD</text>
  <text x="68" y="300" class="fg strong">John Doe</text>
  <text x="298" y="300" text-anchor="end" class="dim" font-size="11">09:02</text>
  <text x="68" y="320" class="accent" font-size="12" font-style="italic">typing…</text>
  <line class="softborder" x1="0" y1="340" x2="320" y2="340"/>

  <!-- row 4 -->
  <circle cx="36" cy="372" r="20" fill="#3a3a3c"/>
  <text x="36" y="377" text-anchor="middle" class="fg strong">EL</text>
  <text x="68" y="364" class="fg strong">Erik Lindqvist</text>
  <text x="298" y="364" text-anchor="end" class="dim" font-size="11">Yesterday</text>
  <text x="68" y="384" class="muted" font-size="12">sounds good, ttyl</text>
  <line class="softborder" x1="0" y1="404" x2="320" y2="404"/>

  <!-- row 5 with unread -->
  <circle cx="36" cy="436" r="20" fill="#3a3a3c"/>
  <text x="36" y="441" text-anchor="middle" class="fg strong">SK</text>
  <text x="68" y="428" class="fg strong">Studio Crew</text>
  <text x="298" y="428" text-anchor="end" class="dim" font-size="11">Mon</text>
  <text x="68" y="448" class="fg" font-size="12">Kim: pushed a fix for the…</text>
  <circle cx="298" cy="450" r="9" class="badge"/>
  <text x="298" y="454" text-anchor="middle" class="fg bold" font-size="10">5</text>
  <line class="softborder" x1="0" y1="468" x2="320" y2="468"/>

  <!-- row 6 -->
  <circle cx="36" cy="500" r="20" fill="#3a3a3c"/>
  <text x="36" y="505" text-anchor="middle" class="fg strong">+1</text>
  <text x="68" y="492" class="fg strong">+1 (415) 555-0123</text>
  <text x="298" y="492" text-anchor="end" class="dim" font-size="11">Sun</text>
  <text x="68" y="512" class="muted" font-size="12">Your code is 884213. Do not…</text>

  <!-- footer in sidebar -->
  <line class="border" x1="0" y1="688" x2="320" y2="688"/>
  <text x="20"  y="708" class="muted" font-size="11">⚙ Settings</text>
  <text x="180" y="708" class="muted" font-size="11">☼  Theme</text>
  <text x="298" y="708" text-anchor="end" class="muted" font-size="11">v1.4.2</text>

  <!-- main: split into two panes -->
  <!-- pane 1 (left/top) - active -->
  <rect class="pane" x="320" y="32" width="500" height="688"/>
  <line class="border" x1="820" y1="32" x2="820" y2="720"/>

  <!-- pane 1 header -->
  <rect class="titlebar" x="320" y="32" width="500" height="44"/>
  <line class="border" x1="320" y1="76" x2="820" y2="76"/>
  <circle cx="350" cy="54" r="14" fill="#3a3a3c"/>
  <text x="350" y="58" text-anchor="middle" class="fg strong" font-size="11">AS</text>
  <text x="372" y="58" class="fg strong">Anna Svensson</text>
  <text x="800" y="58" text-anchor="end" class="muted">⊞  ⋯</text>

  <!-- pane 1 messages (iMessage style) -->
  <text x="570" y="100" text-anchor="middle" class="dim" font-size="11">Today 10:36</text>

  <!-- them bubble -->
  <rect class="themBubble" x="340" y="116" width="280" height="34" rx="16"/>
  <text x="356" y="138" class="fg">Hey! morning ☀️ how was the demo?</text>

  <rect class="themBubble" x="340" y="160" width="240" height="34" rx="16"/>
  <text x="356" y="182" class="fg">did the new build hold up?</text>
  <text x="340" y="208" class="dim" font-size="11">Anna · 10:36</text>

  <!-- me bubble -->
  <rect fill="url(#meBubble)" x="500" y="226" width="300" height="34" rx="16"/>
  <text x="788" y="248" text-anchor="end" class="fg">went smoothly, almost zero crashes 🎉</text>

  <rect fill="url(#meBubble)" x="500" y="270" width="300" height="56" rx="16"/>
  <text x="788" y="292" text-anchor="end" class="fg">they want a follow-up next week to look</text>
  <text x="788" y="312" text-anchor="end" class="fg">at the streaming side</text>

  <!-- tapback heart on me bubble -->
  <circle cx="490" cy="232" r="11" fill="#1c1c1e" stroke="#2c2c2e"/>
  <text x="490" y="237" text-anchor="middle" class="heart" font-size="11">♥</text>

  <text x="788" y="338" text-anchor="end" class="dim" font-size="11">Delivered · Read 10:39</text>

  <!-- them with reply / link preview -->
  <rect class="themBubble" x="340" y="356" width="380" height="34" rx="16"/>
  <text x="356" y="378" class="fg">nice, sending the recording link 👇</text>

  <!-- link preview card -->
  <rect class="themBubble" x="340" y="402" width="360" height="78" rx="14" filter="url(#cardShadow)"/>
  <rect x="340" y="402" width="80" height="78" rx="14" fill="#3a3a3c"/>
  <text x="380" y="448" text-anchor="middle" class="muted" font-size="22">▶</text>
  <text x="432" y="424" class="fg strong">Demo recording — Q2 review</text>
  <text x="432" y="442" class="muted" font-size="11">notes.studio.local · 18 min</text>
  <text x="432" y="464" class="dim" font-size="11">Shared link preview, fetched locally</text>

  <text x="340" y="498" class="dim" font-size="11">Anna · 10:41</text>

  <!-- typing indicator -->
  <rect class="themBubble" x="340" y="520" width="64" height="28" rx="14"/>
  <circle cx="358" cy="534" r="3" class="muted"/>
  <circle cx="372" cy="534" r="3" class="muted"/>
  <circle cx="386" cy="534" r="3" class="muted"/>

  <!-- pane 1 input -->
  <line class="border" x1="320" y1="652" x2="820" y2="652"/>
  <rect class="input" x="340" y="666" width="420" height="36" rx="18"/>
  <text x="356" y="690" class="muted">iMessage</text>
  <circle cx="788" cy="684" r="16" class="accent"/>
  <text x="788" y="689" text-anchor="middle" class="fg bold">↑</text>
  <text x="350" y="688" class="muted" font-size="14">＋</text>

  <!-- pane 2 (top right) -->
  <rect class="pane" x="820" y="32" width="380" height="344"/>

  <!-- pane 2 header -->
  <rect class="titlebar" x="820" y="32" width="380" height="44"/>
  <line class="border" x1="820" y1="76" x2="1200" y2="76"/>
  <circle cx="850" cy="54" r="14" fill="#3a3a3c"/>
  <text x="850" y="58" text-anchor="middle" class="fg strong" font-size="11">SK</text>
  <text x="872" y="58" class="fg strong">Studio Crew</text>
  <text x="1180" y="58" text-anchor="end" class="muted">⊞  ⋯  ✕</text>

  <text x="1010" y="100" text-anchor="middle" class="dim" font-size="11">Today 09:14</text>

  <rect class="themBubble" x="840" y="116" width="240" height="34" rx="16"/>
  <text x="856" y="138" class="fg">Kim: pushed a fix for the audio</text>

  <rect fill="url(#meBubble)" x="900" y="160" width="280" height="34" rx="16"/>
  <text x="1168" y="182" text-anchor="end" class="fg">awesome, will test on the M3 here</text>

  <!-- attachment thumb -->
  <rect class="themBubble" x="840" y="200" width="160" height="100" rx="16"/>
  <rect x="840" y="200" width="160" height="100" rx="16" fill="#3a3a3c"/>
  <text x="920" y="254" text-anchor="middle" class="muted" font-size="28">🖼</text>
  <text x="920" y="282" text-anchor="middle" class="muted" font-size="10">screenshot.png · 412 KB</text>

  <!-- pane 2 input -->
  <line class="border" x1="820" y1="320" x2="1200" y2="320"/>
  <rect class="input" x="840" y="332" width="300" height="32" rx="16"/>
  <text x="856" y="353" class="muted">iMessage</text>
  <circle cx="1168" cy="348" r="14" fill="#3a3a3c"/>
  <text x="1168" y="353" text-anchor="middle" class="muted bold">↑</text>
  <text x="850" y="352" class="muted" font-size="14">＋</text>

  <!-- horizontal split divider -->
  <line class="border" x1="820" y1="376" x2="1200" y2="376"/>

  <!-- pane 3 (bottom right) -->
  <rect class="pane" x="820" y="376" width="380" height="344"/>

  <!-- pane 3 header -->
  <rect class="titlebar" x="820" y="376" width="380" height="44"/>
  <line class="border" x1="820" y1="420" x2="1200" y2="420"/>
  <circle cx="850" cy="398" r="14" fill="#3a3a3c"/>
  <text x="850" y="402" text-anchor="middle" class="fg strong" font-size="11">JD</text>
  <text x="872" y="402" class="fg strong">John Doe</text>
  <text x="1180" y="402" text-anchor="end" class="muted">⊞  ⋯  ✕</text>

  <text x="1010" y="444" text-anchor="middle" class="dim" font-size="11">Today 09:02</text>

  <rect class="themBubble" x="840" y="460" width="220" height="34" rx="16"/>
  <text x="856" y="482" class="fg">are you free for a quick call?</text>

  <rect fill="url(#meBubble)" x="940" y="504" width="240" height="34" rx="16"/>
  <text x="1168" y="526" text-anchor="end" class="fg">give me 5, finishing a thing</text>

  <rect class="themBubble" x="840" y="548" width="64" height="28" rx="14"/>
  <circle cx="858" cy="562" r="3" class="muted"/>
  <circle cx="872" cy="562" r="3" class="muted"/>
  <circle cx="886" cy="562" r="3" class="muted"/>
  <text x="840" y="592" class="dim" font-size="11">John is typing…</text>

  <!-- pane 3 input -->
  <line class="border" x1="820" y1="652" x2="1200" y2="652"/>
  <rect class="input" x="840" y="666" width="300" height="36" rx="18"/>
  <text x="856" y="690" class="muted">iMessage</text>
  <circle cx="1168" cy="684" r="16" fill="#3a3a3c"/>
  <text x="1168" y="689" text-anchor="middle" class="muted bold">↑</text>
  <text x="850" y="688" class="muted" font-size="14">＋</text>
</svg>
